services:
  openchamber:
    build:
      context: .
      dockerfile: Dockerfile
    image: openchamber:local
    container_name: openchamber
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/openchamber:/home/openchamber/.config/openchamber
      - ./data/opencode/share:/home/openchamber/.local/share/opencode
      - ./data/opencode/state:/home/openchamber/.local/state/opencode
      - ./data/opencode/config:/home/openchamber/.config/opencode
      - ./data/ssh:/home/openchamber/.ssh
      - ./workspaces:/home/openchamber/workspaces
    environment:
      - UI_PASSWORD=${UI_PASSWORD}  # Uncomment to set UI password
      - CF_TUNNEL=${CF_TUNNEL}  # Enable Cloudflare Tunnel (true/qr/password)
      - OH_MY_OPENCODE=${OH_MY_OPENCODE} # enable oh-my-opencode
      - OPENCODE_HOST=${OPENCODE_HOST} # Connect to external OpenCode server
      - OPENCODE_SKIP_START=${OPENCODE_SKIP_START} # skip start opencode
    restart: unless-stopped
